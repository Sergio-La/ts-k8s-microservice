name: CI/CD

# ============================================================
# Disparador: se ejecuta automáticamente en cada push a main
# ============================================================
on:
  push:
    branches:
      - main

# Permisos mínimos por seguridad (principio de menor privilegio)
permissions:
  contents: read

# Evita ejecuciones duplicadas en paralelo si llegan varios
# commits seguidos a main; cancela los anteriores en curso
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Integración Continua (CI)
  # Valida que el código TypeScript compila correctamente
  # antes de invertir tiempo en construir la imagen Docker
  # ============================================================
  ci:
    name: CI - Validar TypeScript
    runs-on: ubuntu-latest
    steps:
      # Checkout del código del repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # Instala Node.js 20 con caché automática de dependencias npm
      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Instala dependencias de forma reproducible desde package-lock.json
      - name: Instalar dependencias
        run: npm ci

      # Compila el proyecto TypeScript; si hay errores, el workflow falla aquí
      - name: Compilar TypeScript (npm run build)
        run: npm run build

  # ============================================================
  # Job 2: Dockerización (CD)
  # Construye la imagen de producción y la publica en Docker Hub
  # Depende del job de CI para no publicar imágenes con código roto
  # ============================================================
  docker:
    name: Docker - Build & Push a Docker Hub
    runs-on: ubuntu-latest
    needs: ci # Solo se ejecuta si el job CI pasó correctamente
    steps:
      # Checkout del código (necesario para acceder al Dockerfile)
      - name: Checkout del código
        uses: actions/checkout@v4

      # Configura Buildx para soporte de multi-stage builds y caché de capas
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Inicia sesión en Docker Hub usando GitHub Secrets (sin exponer credenciales)
      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Construye y publica la imagen en Docker Hub con dos tags:
      #   - latest: referencia móvil que apunta a la versión más reciente
      #   - build-<n>: tag inmutable con el número de ejecución para trazabilidad
      - name: Construir y publicar imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ts-k8s-microservice:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ts-k8s-microservice:build-${{ github.run_number }}
          # Caché de capas en GitHub Actions para acelerar builds posteriores
          cache-from: type=gha
          cache-to: type=gha,mode=max
